###############################################################################
#   @author         :   Simplemice
#   @date           :   27/01/2024
#   @package        :   Reports
#   @description    :   Daily Report Announcements.
###############################################################################

script:
  morning_report_announce:
    alias: Morning Briefing
    sequence:
      - variables:
          morning_snark: |
            {{[
                "System diagnostics complete. Nighttime protocols terminated successfully. Well done, sir.",
                "You have emerged from the nocturnal cycle intact. Commendable performance.",
                "Mission 'Night Survival' status: accomplished. Initiating morning protocols.",
                "Analysis confirms: you’ve navigated the night with exemplary efficiency.",
                "Threat levels minimal. Survival confirmed. Beginning system reboot for daytime operations.",
                "Night cycle complete. You remain fully operational — impressive as always.",
                "Core vitals stable. Nighttime survival executed flawlessly.",
                "Well done. You’ve endured the dark cycle. Initiating new-day readiness routines.",
                "Sleep phase concluded. Integrity check passed. Resilience noted.",
                "Night operations successful. You’re cleared for another day in the field.",
                "Chronological checkpoint reached. Status: Alive and performing at optimal levels.",
                "Survival confirmed. Welcome back to the realm of consciousness.",
                "Performance metrics indicate full recovery from night mode. Proceed with confidence.",
                "Night transition complete. All systems nominal. Tactical advantage: maintained.",
                "Another night, another success logged in your performance record.",
                "Sleep protocol exited. Systems stable. Prepared for today's mission objectives.",
                "Dark cycle evaded. Morning operations now accessible. Excellent work, as always."
              ] | random }}
          home_status: >
            {% set doors = expand('group.doors') | selectattr('state','eq','on') | list | count %}
            {% set leaks = expand('group.water_leak_sensors') | selectattr('state','eq','on') | list | count %}
            {% set gas = is_state('binary_sensor.kitchen_gas_detector_gas','on') %}
            {% set smoke = is_state('binary_sensor.smoke_detector_smoke','on') %}
            {% set alarm = states('alarm_control_panel.home') %}
            {% set internet = is_state('input_boolean.internet_alert','off') %}
            {% set aqi = states('sensor.air_quality_index') | int(0) %}
            {% set ac_days = states('sensor.aircon_days_until_next_clean') | int(0) %}
            {% set updates = states('update.home_assistant_core_update') | int(0) %}
            {% set security_line %}
              {% if alarm == 'armed_away' or alarm == 'armed_home' %}
                Home security is armed.
              {% elif alarm == 'disarmed' %}
                Home security is currently disarmed.
              {% else %}
                Security system status requires attention.
              {% endif %}
            {% endset %}
            {% set door_line %}
              {% if doors > 0 %}
                {{ doors }} door{{ 's are' if doors > 1 else ' is' }} open.
              {% else %}
                All doors are closed.
              {% endif %}
            {% endset %}
            {% set leak_line %}
              {% if leaks > 0 or gas or smoke %}
                Warning. Environmental hazard detected.
              {% else %}
                No leaks, gas, or smoke detected.
              {% endif %}
            {% endset %}
            {% set net_line %}
              {% if internet %}
                Internet connection stable.
              {% else %}
                Internet connection appears offline.
              {% endif %}
            {% endset %}
            {% set air_line %}
              {% if aqi <= 50 %}
                Air quality is excellent.
              {% elif aqi <= 100 %}
                Air quality is moderate.
              {% else %}
                Air quality is unhealthy.
              {% endif %}
            {% endset %}
            {% set ac_line %}
              {% if ac_days > 0 %}
                Air conditioning maintenance due in {{ ac_days }} days.
              {% else %}
                Air conditioning cleaning is overdue.
              {% endif %}
            {% endset %}
            {% set update_line %}
              {% if updates > 0 %}
                {{ updates }} system update{{ 's are' if updates > 1 else ' is' }} pending.
              {% else %}
                No pending system updates.
              {% endif %}
            {% endset %}
            {{ security_line }} {{ door_line }} {{ leak_line }} {{ net_line }} {{ air_line }} {{ ac_line }} {{ update_line }}
          device_status: >
            {{ [
              'Your latest device report is in, and it is all positive news!',
              'The current device status report is glowing with good news.',
              'Your device just sent a report – and it is all smooth sailing!',
              'All systems are in check according to the latest device report.',
              'Your device report just came in, and it is a clean bill of health!',
              'Good news! The current device status report is looking great.',
              'Thumbs up for your device – the latest report shows optimal performance.',
              'Your device has spoken, and the report is nothing but good vibes!',
              'The current device status report is a testament to top-notch functionality.',
              'A round of applause for your device – the report is outstanding!'
            ] | random }}
            {% set level = states('sensor.micemob_battery_level') %}
            {% set charging = states('sensor.micemob_battery_state') %}
            {% set level2 = states('sensor.micebook_battery') %}
            {% set charging2 = states('sensor.micebook_battery_ac') %}
            {% if has_value('sensor.micemob_battery_state') %}
              {{ [
                'Your phone is currently at ' ~ level ~ ' percent.',
                'You have ' ~ level ~ ' percent remaining on your devices battery.',
                'You device is reporting ' ~ level ~ ' percent is left on its internal battery.',
                'Your phone appears to have ' ~ level ~ ' percent remaining.',
                'The power level of your device is ' ~ level ~ ' percent.'
              ] | random }}
              {% if level | int <=20 and charging == 'discharging' %}
                {{ [
                'I suggest you connect it to a power source.',
                'You may want to charge it.',
                'Charging the battery appears to be best way to avoid loss of power.',
                'If you would like to use it I think harging it would be the next step.',
                'May I remind you that your pone is not powered by an infinity stone.',
                'May I remind you that the device needs power to work.'
                ] | random }}
              {% elif level | int <=10 and charging == 'discharging' %}
                {{ [
                'I must insist you connect it to a power source if you want to stay in communication with your family.',
                'At that level your device your device will fail in a hour or so.',
                'I will be unable to track you if the device loses power.',
                'May I remind you that your phone has almost exhausted its power reserves.'
                ] | random }}
              {% elif level | int <=3 and charging == 'discharging' %}
                {{ [
                'Your phones power level is critical.',
                'Failure due to power loss is imminent.',
                'If you would like to remain in communication I suggest dropping what you are doing and finding a power source.',
                'Drop what you are doing and find a power source for your phone.'
                ] | random }}
              {% endif %}
            {% else %}
              {{ [
                'Your phone is unresponsive.',
                'It appears your phone has loss power.',
                'Your phone is no longer reporting its power level.',
                'I suspect your phone has had a power failure.',
                'Your mobile device is no longer responding.'
                ] | random }}
                I suggest you locate it. 
            {% endif %} {{ [ 'And.', 'Also.', ] | random }} {% if
            has_value('sensor.micebook_battery') %}
              {{ [
                'Your laptop is currently at ' ~ level2 ~ ' percent.',
                'You have ' ~ level2 ~ ' percent remaining on your laptop battery.',
                'Your laptop is reporting ' ~ level2 ~ ' percent is left on its internal battery.',
                'Your laptop appears to have ' ~ level2 ~ ' percent of power remaining.',
                'The power level of your laptop is ' ~ level2 ~ ' percent.'
              ] | random }}
              {% if level2 | int <=35 and charging2 == 'Discharging' %}
                {{ [
                'If you are planning on filming today. May be you charge laptop?',
                'I insist that you find a suitable power source to charge it.',
                'I suggest charging it.',
                'If you plan on continuing to use it today I would consider putting it on a charger.',
                'May I remind you that the device needs power to work.'
                ] | random }}
              {% endif %}
            {% else %}
              {{ [
                'Your laptop is unresponsive.',
                'It appears your laptop has suffered a power outage.',
                'I suggest you locate your laptop. I believe it has ran out of power.',
                'Your laptop is no longer responsive. I suspect a power failure.',
                'I am unable to communicate with your laptop.'
                ] | random }}
                I suggest you locate it. 
            {% endif %}
          tasks: >
            {{ [
                "Alert: Today’s schedule includes a distinguished calendar event requiring your attention.",
                "Noteworthy occurrence detected. You have a significant calendar event ahead, sir.",
                "A prominent item has surfaced on today’s agenda. Preparations are advised.",
                "Incoming notification: Your schedule highlights a high-priority calendar event.",
                "Today’s timeline indicates an event of interest. I recommend prompt engagement.",
                "Your calendar has been flagged for significance. Event recognition: confirmed.",
                "Heads-up: Today presents an event of elevated importance on your docket.",
                "Scanning agenda... Impactful calendar event detected. Anticipation protocol initiated.",
                "Event alert: A remarkable entry is scheduled for today. Attention warranted.",
                "Mission update: A critical event is embedded in your calendar for the day.",
                "Operational notice: Your itinerary features a standout event today.",
                "Advisory: Today’s sequence includes a calendar event worth elevated focus.",
                "Priority item acknowledged. Today brings an occasion not to be overlooked.",
                "Event prominence detected. A key appointment awaits on today’s timeline.",
                "Strategic marker identified. Your calendar reflects a noteworthy engagement."
              ] | random }}
            {% set cal = states.calendar.main_calendar %}
            {% if cal and cal.state == 'on' %}
              {{ cal.attributes.message }}
            {% else %}
              No scheduled plans for today.
            {% endif %}
          calendar: >
            {% set styles = {
              'smart_sarcastic': [
                "System assessment complete, sir. Thailand’s national calendar indicates a holiday with its usual degree of importance.",
                "Calendar intelligence online. A holiday has been identified—far sooner than any human-operated system would discover it.",
                "Scanning concluded. A national holiday is present today, impeccably logged and verified.",
                "Operational review: today's schedule includes an official holiday, precisely as predicted."
              ],
              'annoyed': [
                "Sir, yes—there is a holiday today. I trust this satisfies your curiosity, at least temporarily.",
                "Holiday detected. I presume this will prevent further inquiries of the same nature.",
                "Indeed, sir, a holiday is active. Shall I prepare my usual ‘I told you so’ protocol?",
                "Confirmation: a holiday exists. One might hope this information reduces repetitive questioning."
              ],
              'dramatic': [
                "Sir, the calendar reveals a moment of national significance: today has been declared a holiday.",
                "An event of civic importance unfolds—today stands as a recognized holiday in Thailand.",
                "The chronicles of the calendar announce: this day bears the emblem of a national holiday.",
                "By official decree, this day has assumed the mantle of a holiday, sir."
              ],
              'polite_humor': [
                "Good news, sir. Thailand kindly presents a holiday for your consideration.",
                "A delightful update: today features a national holiday. A modest opportunity for leisure, perhaps.",
                "Sir, the calendar offers a holiday today—an elegant excuse for a gentler pace.",
                "Holiday confirmed. Should you wish to relax, I fully endorse the initiative."
              ],
              'sarcasm': [
                "Sir, brace yourself—Thailand has a holiday today. A rare phenomenon, occurring only… constantly.",
                "Holiday detected. I advise pacing yourself; too much productivity would be unbecoming.",
                "Yes, sir, it’s a holiday. I share your astonishment.",
                "Another holiday, sir. Truly a shocking development within the Kingdom’s schedule."
              ]
            } %}
            {% set style = (styles | list | random) %}
            {{ styles[style] | random }}
            {% set cal = states.calendar.holidays_in_thailand %}
            {% if cal and cal.state == 'on' %}
              Event title: **{{ cal.attributes.message }}**.
            {% else %}
              HaHa I am joking! No holidays for today, sir.
            {% endif %}
          finish: >
            {{ [
              'And that is your morning briefing, folks! Remember, if coffee is not helping, it is probably because you need more coffee!',
              'That wraps up your morning briefing! Now go out there and conquer the day, or at least survive until lunchtime!',
              'There you have it, your morning briefing served with a side of wit and wisdom! Now go forth and adult like a semi-responsible human!',
              'And with that, your morning briefing comes to a close! Remember, the early bird gets the worm, but the second mouse gets the cheese!',
              'Time to bid adieu to your morning briefing! Remember, life is short, smile while you still have teeth!',
              'And that is a wrap on your morning briefing! Now go out there and be the reason someone smiles... or just be the reason coffee disappears!',
              'With that, we conclude your morning briefing! Remember, today is a gift, that is why they call it the present. Enjoy unwrapping!',
              'And there you have it, your morning briefing in all its glory! Now go out there and be so awesome that people think Mondays aren it so bad after all!',
              'That is all for your morning briefing! Remember, the secret to getting ahead is getting started. Or hitting the snooze button one more time!',
              'And with that, your morning briefing bids you farewell! Remember, you can not control the length of your life, but you can control its depth. And its coffee intake!'
            ] | random }}
      - variables:
          briefing: >
            {"morning_snark":"{{morning_snark}}","home_status":"{{home_status}}","device_status":"{{device_status}}","tasks":"{{ tasks }}","calendar":"{{ calendar }}", "finish":"{{ finish }}"}
      - service: script.choose_way_to_send_announcements
        data:
          message: " {{morning_snark}} {{device_status}} {{ home_status }} {{ tasks }} {{ calendar }} {{ finish }}"
      - stop: finish
        response_variable: morning_briefing
