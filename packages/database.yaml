recorder:
  purge_keep_days: 10
  auto_purge: true
  commit_interval: 10
  exclude:
    entity_globs:
      - sensor.*_signal_strength
      - sensor.*_rssi
      - sensor.*_linkquality
      - sensor.*_uptime
      - sensor.*_last_seen
      - sensor.*_battery_voltage
      - sensor.*_free_memory
      - sensor.*_heap*
      - sensor.*_loop*
      - sensor.*_internal*
      - sensor.*_debug*
      - binary_sensor.*_availability
    domains:
      - updater
      - persistent_notification

logger:
  default: warning
