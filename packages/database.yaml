###############################################################################
#   @author         :   Simplemice
#   @date           :   19/08/2025 (fixed duplicate include key 07/05/2026)
#   @package        :   Recorder
#   @description    :   Recorder Settings
#
#   FIXES:
#   1. Merged two duplicate 'include:' blocks into one
#      (duplicate YAML keys silently drop the first block)
#   2. Removed 'sensor.*_battery*' from exclude globs
#      (it was matching sensor.total_battery_energy_in/out)
###############################################################################

recorder:
  purge_keep_days: 7
  auto_purge: true
  purge_interval: 1
  commit_interval: 30

  db_url: sqlite:////config/home-assistant_v2.db

  include:
    domains:
      - sensor
      - binary_sensor
      - person
      - device_tracker
      - switch
      - light
      - fan
      - climate

    entity_globs:
      - sensor.*_energy
      - sensor.*_power
      - sensor.*_temperature
      - sensor.*_humidity

    entities:
      - sensor.total_battery_energy_in
      - sensor.total_battery_energy_out
      - sensor.total_solar_energy_in
      - sensor.total_grid_energy_import
      - sensor.total_grid_energy_export
      - sensor.solar_energy_accumulated_simulated
      - sensor.battery_soc_simulated
      - sensor.battery_energy_remaining

  exclude:
    entity_globs:
      - sensor.*_signal_strength
      - sensor.*_rssi
      - sensor.*_linkquality
      - sensor.*_last_seen
      - sensor.*_free_memory
      - sensor.*_heap*
      - sensor.*_loop*
      - sensor.*_internal*
      - sensor.*_debug*
      - sensor.*_illuminance_raw
      - sensor.*_pressure_raw
      - binary_sensor.*_availability

    domains:
      - updater
      - persistent_notification
      - automation
      - script

logger:
  default: warning
