intent_script:
  housemusic:
    action:
      - variables:
          player: >
            {% set room = states('sensor.micemob_area') | lower | trim %}
            {% set mapping = {
              'livingroom': 'media_player.livingroom_player',
              'bedroom': 'media_player.bedroom_speaker',
              'kitchen': 'media_player.kitchen_speaker'
            } %}
            {{ mapping.get(room, 'media_player.livingroom_player') }}
      - service: music_assistant.play_media
        target:
          entity_id: "{{ player }}"
        data:
          media_id: "Liked Songs simplemice"
          media_type: playlist
          enqueue: replace
          radio_mode: true

  whattheweather:
    action:
      - service: script.jarvis_weather_forecast

  whatthetraffic:
    action:
      - service: script.jarvis_weather_forecast

  checkwaterlevel:
    action:
      - variables:
          level: >
            {{ states('sensor.water_sensor_water_level') | float(0) | round(0) }}
          volume: >
            {{ states('sensor.water_sensor_water_volume') | float(0) | round(1) }}
    response:
      speech:
        text: >
          The water tank is {{ level }} percent full with
          {{ volume }} liters remaining.
