intent_script:
  housemusic:
    action:
      - variables:
          player: >
            {% set room = states('sensor.micemob_area') | lower | trim %}
            {% set mapping = {
              'livingroom': 'media_player.livingroom_player',
              'bedroom': 'media_player.bedroom_speaker',
              'kitchen': 'media_player.kitchen_speaker'
            } %}
            {{ mapping.get(room, 'media_player.livingroom_player') }}
      - service: music_assistant.play_media
        target:
          entity_id: "{{ player }}"
        data:
          media_id: "Liked Songs simplemice"
          media_type: playlist
          enqueue: replace
          radio_mode: true

  whattheweather:
    action:
      action: weather.get_forecasts
      data:
        type: daily
      target:
        entity_id: weather.pirateweather
      response_variable: pw_forecast
    speech:
      text: >
        Today: {{ states('weather.pirateweather') }},
        {{ state_attr('weather.pirateweather', 'temperature') }}°C,
        humidity {{ state_attr('weather.pirateweather', 'humidity') }}%.
        Tomorrow: {{ pw_forecast['weather.pirateweather']['forecast'][1]['condition'] }},
        high {{ pw_forecast['weather.pirateweather']['forecast'][1]['temperature'] }}°C,
        rain chance {{ pw_forecast['weather.pirateweather']['forecast'][1]['precipitation_probability'] }}%,
        precipitation {{ pw_forecast['weather.pirateweather']['forecast'][1]['precipitation'] }}mm.

  fullweather:
    action:
      - service: script.tts_jarvis_weather_forecast

  whatthetraffic:
    action:
      - service: script.tts_jarvis_traffic_forecast

  checkwaterlevel:
    action:
      - variables:
          level: >
            {{ states('sensor.water_sensor_water_level') | float(0) | round(0) }}
          volume: >
            {{ states('sensor.water_sensor_water_volume') | float(0) | round(1) }}
    response:
      speech:
      text: >
        {% if level|int < 20 %}
        Warning. Water level is low at {{ level }} percent.
        {% else %}
        Water tank level is {{ level }} percent,
        approximately {{ volume }} liters remaining.
        {% endif %}
