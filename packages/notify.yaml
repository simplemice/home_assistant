group:
  notification_group:
    name: Notification Group
    entities:
      - input_boolean.audible_notifications
      - input_boolean.text_notifications
      - input_boolean.telegram_notifications
      - input_boolean.persistent_notifications
      - input_boolean.tv_notifications

input_select:
  jarvis_pipeline:
    name: Jarvis Pipeline
    icon: mdi:pipe
    options:
      - tts.piper
      - tts.google_translate_en_com
      - tts.home_assistant_cloud

input_boolean:
  audible_notifications:
    name: Audible Notification
    icon: mdi:cast-audio
  text_notifications:
    name: Text Notification
    icon: mdi:message-text
  telegram_notifications:
    name: Telegram Notification
    icon: fab:telegram
  persistent_notifications:
    name: Persistent Notification
    icon: mdi:bell
  tv_notifications:
    name: TV Notification
    icon: mdi:television-box
  mastodon_notifications:
    name: Mastodon Notification
    icon: mdi:mastodon

