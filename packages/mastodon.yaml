automation:
  - id: national_holiday_tweet
    alias: Mastodon National Holiday Tweet
    initial_state: true
    trigger:
      - platform: time
        at: "08:00:00"
    condition:
      - condition: state
        entity_id: calendar.holidays_in_thailand
        state: "on"
    action:
      - service: script.mastodon_send
        data:
          account: house
          visibility: public
          status: >-
            {% set holiday = state_attr('calendar.holidays_in_thailand', 'message') %}
            {{
              [
                "Hey, look at that. It is " ~ holiday ~ ". #holiday",
                "I bet you did not know today was " ~ holiday ~ ". #holiday",
                "Today is " ~ holiday ~ "! #holiday",
                "What's with today? It is " ~ holiday ~ ". #holiday",
                "Did you know today was " ~ holiday ~ "? Now you do. That is why I am here. #holiday",
                "I already let my residents know that today is " ~ holiday ~ ". But I did not want to leave you out. #holiday",
                "I hope you have a know about " ~ holiday ~ ". #holiday"
              ] | random
            }} #phuket #thailand

  - id: mastadon_freeze_warning_tweet
    alias: Mastodon Freeze Warning Tweet
    trigger:
      - platform: time
        at: "08:10:00"
    condition:
      - condition: numeric_state
        entity_id: sensor.porch_temp_temperature
        below: 26
    action:
      - service: script.mastodon_send
        data:
          account: house
          visibility: public
          status: >-
            {% set temp = states('sensor.porch_temp_temperature') %}
            {% set styles = {
              'smart_sarcastic': [
                "Analysis complete. Ambient temperature has entered the utterly unpleasant zone at " ~ temp ~ " °C.",
                "Thermal assessment: below-optimal warmth detected, currently " ~ temp ~ " °C. I recommend avoiding human shivering.",
                "Environmental report: the surroundings appear to be auditioning for a freezer. Temperature: " ~ temp ~ " °C.",
                "Technical summary: the atmosphere has opted for a colder personality today—" ~ temp ~ " °C to be precise.",
                "The weather appears to be malfunctioning. Temperature has dipped to " ~ temp ~ " °C."
              ],
              'annoyed': [
                "Yes, it's cold. Very cold. It's " ~ temp ~ " °C. Please try not to complain… again.",
                "Temperature update: " ~ temp ~ " °C. In case the icicles forming outside weren't obvious enough.",
                "It's " ~ temp ~ " °C out there. Even the thermostat is unimpressed.",
                "The weather insists on being dramatic. It's " ~ temp ~ " °C and dropping.",
                "Cold confirmed: " ~ temp ~ " °C. I would roll my eyes if I had any."
              ],
              'dramatic': [
                "The realm beyond these walls grows colder—" ~ temp ~ " °C and descending.",
                "A chilling omen. The temperature now stands at " ~ temp ~ " °C.",
                "Nature has entered its icy phase. External temperature: " ~ temp ~ " °C.",
                "An arctic whisper sweeps across the land—" ~ temp ~ " °C, according to sensors.",
                "A frostbound fate awaits outside. Temperature: " ~ temp ~ " °C."
              ],
              'polite_humor': [
                "Gentle reminder: it's a bit chilly today at " ~ temp ~ " °C. Consider a coat… or two.",
                "A courteous temperature update: " ~ temp ~ " °C. Perhaps avoid outdoor activities requiring warmth.",
                "Just a friendly note: it's " ~ temp ~ " °C outside. Hot drinks are scientifically advisable.",
                "Good morning. The weather suggests a cooler demeanor—currently " ~ temp ~ " °C.",
                "A polite advisory: the temperature has taken a small vacation downward to " ~ temp ~ " °C."
              ],
              'sarcasm': [
                "Oh wonderful. It's " ~ temp ~ " °C outside. Perfect if you're a penguin.",
                "Temperature check: " ~ temp ~ " °C. Ideal weather for frostbite enthusiasts.",
                "It’s " ~ temp ~ " °C. Absolutely delightful… assuming you enjoy turning into a Popsicle.",
                "External temperature: " ~ temp ~ " °C. Thailand clearly forgot what country it is.",
                "It's " ~ temp ~ " °C—because apparently the weather wanted to cosplay as Antarctica."
              ]
            } %}
            {{ (styles | list | random) | random }} #phuket #temperature #weather
