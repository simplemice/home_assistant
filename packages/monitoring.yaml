###############################################################################
#   @author         :   Simplemice
#   @date           :   27/01/2024
#   @package        :   Sysmon
#   @description    :   A collection of Home Assistant and Pi Sensors
###############################################################################

command_line:
  - sensor:
      name: "Lines of Code"
      unique_id: lines_of_code
      command: "find /config -name '*.yaml' | xargs cat | wc -l"
      scan_interval: 20000

sensor:
  - platform: time_date
    display_options:
      - "time"
      - "date"
      - "date_time_iso"
      - "time_date"
      - "time_utc"
  # Count only sleep between yesterday 22:00 → today 08:00
  - platform: history_stats
    name: Night Sleep Duration
    unique_id: night_sleep_duration
    entity_id: binary_sensor.bed_occupancy
    state: "on"
    type: time
    start: >
      {{ today_at("22:00") - timedelta(days=1) }}
    end: >
      {{ today_at("08:00") }}

template:
  - sensor:
      - name: "Total Lights On"
        unique_id: total_lights_on_count
        state: >
          {{ expand('light.all_lights') | selectattr('state', 'eq', 'on') | list | count }}
      - name: "Count Lights On"
        unique_id: count_lights_on
        state: >
          {{ expand('light.lights') | selectattr('state', 'eq', 'on') | list | count }}
      - name: "Total WLED On"
        unique_id: total_wled_on_count
        state: >
          {{ expand('light.wled_ambient') | selectattr('state', 'eq', 'on') | list | count }}
      - name: "Total Doors Open"
        unique_id: total_doors_open_count
        state: >
          {{ states.binary_sensor
            | selectattr('state', 'eq', 'on')
            | selectattr('attributes.device_class', 'eq', 'door')
            | rejectattr('entity_id', 'eq', 'binary_sensor.bedroom_door_contact')
            | list
            | count }}
      - name: "Total Windows Open"
        unique_id: total_windows_open_count
        state: >
          {{ states.binary_sensor | selectattr('state', 'eq', 'on') | selectattr('attributes.device_class', 'eq', 'window') | list | count }}
      - name: "Total Fans On"
        unique_id: total_fans_on_count
        state: >
          {{ expand('fan.all_fans') | selectattr('state', 'eq', 'on') | list | count }}
      - name: "Total Climate On"
        unique_id: total_climate_on_count
        state: >
          {{ states.climate | rejectattr('state','eq','off') | list | count }}

utility_meter:
  daily_sleep_duration:
    name: Daily Sleep Duration
    source: sensor.night_sleep_duration
    cycle: daily

  monthly_sleep_duration:
    name: Monthly Sleep Duration
    source: sensor.night_sleep_duration
    cycle: monthly

  yearly_sleep_duration:
    name: Yearly Sleep Duration
    source: sensor.night_sleep_duration
    cycle: yearly

binary_sensor:
  - platform: tod
    name: Morning
    after: "7:00"
    before: "12:00"
    unique_id: morning
  - platform: tod
    name: Afternoon
    after: "12:00"
    before: "18:00"
    unique_id: afternoon
  - platform: tod
    name: Evening
    after: "18:00"
    before: "22:00"
    unique_id: evening
  - platform: tod
    name: Night
    after: "22:00"
    before: "7:00"
    unique_id: night
