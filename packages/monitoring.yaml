###############################################################################
#   @author         :   Simplemice
#   @date           :   27/01/2024
#   @package        :   Sysmon
#   @description    :   A collection of Home Assistant and Pi Sensors
###############################################################################

###############################################################################
# REST COMMAND
###############################################################################
rest_command:
  get_sensor_history:
    url: "http://localhost:8123/api/history/period/{{ start_time }}?filter_entity_id={{ entity_id }}&minimal_response&no_attributes"
    method: GET
    headers:
      Authorization: !secret ha_token
      Content-Type: "application/json"

###############################################################################
# COMMAND LINE
###############################################################################
command_line:
  - sensor:
      name: "Lines of Code"
      unique_id: lines_of_code
      command: >
        bash -c "find /config -type f -name '*.yaml' -print0 |
        xargs -0 cat | wc -l"
      scan_interval: 21600 # 6 hours

###############################################################################
# TIME / DATE
###############################################################################
sensor:
  - platform: time_date
    display_options:
      - time
      - date
      - date_time_iso
      - time_date
      - time_utc

  ###############################################################################
  # SLEEP TRACKING (FIXED)
  ###############################################################################
  - platform: history_stats
    name: Night Sleep Duration
    unique_id: night_sleep_duration
    entity_id: binary_sensor.bed_occupancy
    state: "on"
    type: time
    start: >
      {{ (now().replace(hour=22, minute=0, second=0) - timedelta(days=1)) }}
    end: >
      {{ now().replace(hour=8, minute=0, second=0) }}

###############################################################################
# TEMPLATE (TRIGGER-BASED, SAME NAMES)
###############################################################################
template:
  - trigger:
      - platform: time_pattern
        minutes: "/2"
      - platform: state
        entity_id:
          - light.all_lights
          - light.lights
          - light.wled_ambient
          - binary_sensor.bedroom_door_contact
    sensor:
      - name: "Total Lights On"
        unique_id: total_lights_on_count
        state: >
          {{ expand('light.all_lights')
            | selectattr('state','eq','on')
            | list | count }}

      - name: "Count Lights On"
        unique_id: count_lights_on
        state: >
          {{ expand('light.lights')
            | selectattr('state','eq','on')
            | list | count }}

      - name: "Total WLED On"
        unique_id: total_wled_on_count
        state: >
          {{ expand('light.wled_ambient')
            | selectattr('state','eq','on')
            | list | count }}

      - name: "Total Doors Open"
        unique_id: total_doors_open_count
        state: >
          {{ states.binary_sensor
            | selectattr('attributes.device_class','eq','door')
            | selectattr('state','eq','on')
            | rejectattr('entity_id','eq','binary_sensor.bedroom_door_contact')
            | list | count }}

      - name: "Total Windows Open"
        unique_id: total_windows_open_count
        state: >
          {{ states.binary_sensor
            | selectattr('attributes.device_class','eq','window')
            | selectattr('state','eq','on')
            | list | count }}

      - name: "Total Fans On"
        unique_id: total_fans_on_count
        state: >
          {{ states.fan
            | selectattr('state','eq','on')
            | list | count }}

      - name: "Total Climate On"
        unique_id: total_climate_on_count
        state: >
          {{ states.climate
            | rejectattr('state','in',['off','unavailable','unknown'])
            | list | count }}

      - name: "Total Unavailable Entities"
        unique_id: total_unavailable_entities_count
        icon: mdi:alert-circle-outline
        state: >
          {% set ignore_domains = ['group','scene','automation'] %}
          {{ states
            | rejectattr('domain','in', ignore_domains)
            | selectattr('state','in',['unavailable','unknown'])
            | list | count }}

###############################################################################
# UTILITY METERS (UNCHANGED NAMES)
###############################################################################
utility_meter:
  daily_sleep_duration:
    name: Daily Sleep Duration
    source: sensor.night_sleep_duration
    cycle: daily

  monthly_sleep_duration:
    name: Monthly Sleep Duration
    source: sensor.night_sleep_duration
    cycle: monthly

  yearly_sleep_duration:
    name: Yearly Sleep Duration
    source: sensor.night_sleep_duration
    cycle: yearly

###############################################################################
# TIME OF DAY (UNCHANGED)
###############################################################################
binary_sensor:
  - platform: tod
    name: Morning
    unique_id: morning
    after: "07:00"
    before: "12:00"

  - platform: tod
    name: Afternoon
    unique_id: afternoon
    after: "12:00"
    before: "18:00"

  - platform: tod
    name: Evening
    unique_id: evening
    after: "18:00"
    before: "22:00"

  - platform: tod
    name: Night
    unique_id: night
    after: "22:00"
    before: "07:00"
