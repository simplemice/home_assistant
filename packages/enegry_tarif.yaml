input_select:
  # Daily Tariff Selector
  grid_energy_daily_tariff:
    name: Grid Energy Daily Tariff
    options:
      - peak
      - offpeak
    initial: offpeak
    icon: mdi:calendar-day
  # Monthly Tariff Selector
  grid_energy_monthly_tariff:
    name: Grid Energy Monthly Tariff
    options:
      - peak
      - offpeak
    initial: offpeak
    icon: mdi:calendar-month
  # Yearly Tariff Selector
  grid_energy_yearly_tariff:
    name: Grid Energy Yearly Tariff
    options:
      - peak
      - offpeak
    initial: offpeak
    icon: mdi:calendar-account

template:
  - sensor:
      - name: "Electricity Tariff"
        unique_id: electricity_tariff_status
        state: >
          {% set now = now() %}
          {% set weekday = now.isoweekday() | int %}
          {% set on_peak_start = today_at("09:00") %}
          {% set on_peak_end = today_at("22:00") %}
          {% if weekday >= 1 and weekday <= 5 %}
            {% if on_peak_start <= now < on_peak_end %}
              peak
            {% else %}
              offpeak
            {% endif %}
          {% else %}
            offpeak
          {% endif %}

      - name: "Electricity Tariff Rate"
        unique_id: electricity_tariff_rate
        unit_of_measurement: "THB/kWh"
        state: >
          {% set now = now() %}
          {% set weekday = now.isoweekday() | int %}
          {% set on_peak_start = today_at("09:00") %}
          {% set on_peak_end = today_at("22:00") %}
          {% if weekday >= 1 and weekday <= 5 %}
            {% if on_peak_start <= now < on_peak_end %}
              5.7982
            {% else %}
              2.6369
            {% endif %}
          {% else %}
            2.6369
          {% endif %}

automation:
  - alias: Update Utility Meter Tariff
    id: update_utility_meter_tariff
    # Trigger uses your correctly defined template sensor
    trigger:
      - platform: state
        entity_id: sensor.electricity_tariff
    action:
      # FIX: Service must be input_select.select_option
      - service: input_select.select_option
        target:
          entity_id:
            # FIX: Targets must be the input_select entities we manually created
            - input_select.grid_energy_daily_tariff
            - input_select.grid_energy_monthly_tariff
            - input_select.grid_energy_yearly_tariff
        data:
          # Use the state (peak or offpeak) from your template sensor
          option: "{{ states('sensor.electricity_tariff') }}"
