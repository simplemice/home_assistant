###############################################################################
# ENERGY (Refactored 2026)
###############################################################################

input_number:
  electricity_rate_peak:
    name: Electricity Peak Rate
    min: 0
    max: 20
    step: 0.0001
    unit_of_measurement: THB/kWh
    initial: 5.7982

  electricity_rate_offpeak:
    name: Electricity Offpeak Rate
    min: 0
    max: 20
    step: 0.0001
    unit_of_measurement: THB/kWh
    initial: 2.6369

  cost_export:
    name: "Solar Export Rate"
    initial: 2.20
    min: 0
    max: 10
    step: 0.01
    unit_of_measurement: "THB/kWh"
    icon: mdi:solar-power-variant

input_select:
  grid_energy_tariff:
    name: Grid Energy Tariff
    options:
      - peak
      - offpeak
    icon: mdi:flash

###############################################################################
# TEMPLATE
###############################################################################

template:
  # SINGLE SOURCE OF TRUTH (triggered)
  - trigger:
      - platform: time
        at: "09:00:00"
      - platform: time
        at: "22:00:00"
      - platform: time
        at: "00:00:00"
    sensor:
      - name: Electricity Tariff
        unique_id: electricity_tariff_status
        state: >
          {% set now = now() %}
          {% set weekday = now.isoweekday() %}
          {% if weekday in [1,2,3,4,5] and (9 <= now.hour < 22) %}
            peak
          {% else %}
            offpeak
          {% endif %}

  # RATE (depends on tariff sensor)
  - sensor:
      - name: Electricity Tariff Rate
        unique_id: electricity_tariff_rate
        unit_of_measurement: THB/kWh
        state: >
          {% if is_state('sensor.electricity_tariff','peak') %}
            {{ states('input_number.electricity_rate_peak') }}
          {% else %}
            {{ states('input_number.electricity_rate_offpeak') }}
          {% endif %}

      - name: "Solar Export Revenue Today"
        unique_id: solar_export_revenue_today
        unit_of_measurement: "THB"
        icon: mdi:cash-plus
        state_class: measurement
        state: >
          {% set exported = states('sensor.solar_export_daily') | float(0) %}
          {% set rate     = states('input_number.cost_export') | float(0) %}
          {{ (exported * rate) | round(2) }}

      - name: "Solar Export Revenue Month"
        unique_id: solar_export_revenue_month
        unit_of_measurement: "THB"
        icon: mdi:cash-plus
        state_class: measurement
        state: >
          {% set exported = states('sensor.solar_export_monthly') | float(0) %}
          {% set rate     = states('input_number.cost_export') | float(0) %}
          {{ (exported * rate) | round(2) }}

      - name: "Grid Import Cost Today"
        unique_id: grid_import_cost_today
        unit_of_measurement: "THB"
        icon: mdi:cash-minus
        state_class: measurement
        state: >
          {% set peak_kwh  = states('sensor.grid_import_daily_peak') | float(0) %}
          {% set off_kwh   = states('sensor.grid_import_daily_offpeak') | float(0) %}
          {% set peak_rate = states('input_number.electricity_rate_peak') | float(0) %}
          {% set off_rate  = states('input_number.electricity_rate_offpeak') | float(0)
          %}
          {{ ((peak_kwh * peak_rate) + (off_kwh * off_rate)) | round(2) }}

      - name: "Net Energy Cost Today"
        unique_id: net_energy_cost_today
        unit_of_measurement: "THB"
        icon: mdi:scale-balance
        state_class: measurement
        state: >
          {% set import_cost = states('sensor.grid_import_cost_today') | float(0) %}
          {% set export_rev  = states('sensor.solar_export_revenue_today') | float(0)
          %}
          {{ (import_cost - export_rev) | round(2) }}

###############################################################################
# AUTOMATION
###############################################################################

automation:
  - alias: Sync Utility Meter Tariff
    id: sync_utility_meter_tariff

    trigger:
      - platform: state
        entity_id: sensor.electricity_tariff

    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.grid_energy_tariff
        data:
          option: "{{ trigger.to_state.state }}"
