###############################################################################
#   @author         :   Simplemice
#   @date           :   27/01/2024
#   @package        :   Presence
#   @description    :   A Collection of Presence Related Trackers and Sensors
###############################################################################

group:
  family:
    name: Family
    icon: mdi:account-group
    entities:
      - person.simplemice

###############################################################################
# INPUTS
###############################################################################

input_boolean:
  house_sleep_mode:
    name: House Sleep Mode
    icon: mdi:bed-clock

  family_home:
    name: Family Home
    icon: mdi:account-group

input_datetime:
  mice_wakeup_alarm_time:
    name: WakeUp Alarm Time
    has_time: true

  mice_sleep_time:
    name: Goodnight Time
    has_time: true

  simplemice_left_home_at:
    name: Left Home At
    has_date: true
    has_time: true

  simplemice_return_home_at:
    name: Returned Home At
    has_date: true
    has_time: true

input_select:
  simplemice_dashboard:
    name: Dashboard
    icon: mdi:view-dashboard
    options:
      - Auto
      - Garage
      - Livingroom
      - Bedroom
      - Kitchen
      - Bathroom
      - Backyard
      - Information
      - Statistic

###############################################################################
# TEMPLATE
###############################################################################

template:
  ###########################################################################
  # FAMILY
  ###########################################################################

  - sensor:
      - name: Family Home Count
        unique_id: family_home_count
        icon: mdi:account-group
        state: >
          {{ states.person
             | selectattr('state','eq','home')
             | list | count }}

      - name: Family Home
        unique_id: family_home
        icon: >
          {% set c = states('sensor.family_home_count')|int(0) %}
          {% if c == 0 %} mdi:account-off
          {% elif c == 1 %} mdi:account
          {% elif c == 2 %} mdi:account-multiple
          {% else %} mdi:account-group
          {% endif %}
        state: >
          {{ is_state('group.family', 'home') }}

  ###########################################################################
  # TIME AWAY (LIVE)
  ###########################################################################

- trigger:
    - platform: time_pattern
      seconds: "/1"
  sensor:
    - name: Simplemice Time Away Live
      unique_id: simplemice_time_away_live
      icon: mdi:timer-outline
      state: >
        {% set ts = state_attr('input_datetime.simplemice_left_home_at', 'timestamp') %}
        {% if ts is none %}
          0h 0m 0s
        {% else %}
          {% set seconds = (as_timestamp(now()) - ts) | int %}
          {% set h = seconds // 3600 %}
          {% set m = (seconds % 3600) // 60 %}
          {% set s = seconds % 60 %}
          {{ h }}h {{ m }}m {{ s }}s
        {% endif %}

  ###########################################################################
  # PRESENCE
  ###########################################################################

  - binary_sensor:
      - name: Sofa Presence
        unique_id: sofa_presence
        device_class: occupancy
        state: >
          {{ is_state('binary_sensor.sofa_presence_detector', 'on') }}
        icon: >
          {% if is_state('binary_sensor.sofa_presence_detector', 'on') %}
            mdi:sofa-single
          {% else %}
            mdi:sofa-single-outline
          {% endif %}

  ###########################################################################
  # LOCATION / ROOM
  ###########################################################################

  - sensor:
      - name: Simplemice Room
        unique_id: simplemice_room
        state: >
          {% set area = states('sensor.micemob_area') %}
          {% set charging = states('sensor.micemob_battery_state') %}

          {% if area not in ['not_home','unknown','unavailable',''] and charging != 'charging' %}
            {{ area }}
          {% else %}
            Last seen in {{ states('sensor.simplemice_location') }}
          {% endif %}

      - name: Simplemice Location
        unique_id: simplemice_location
        state: >
          {% set area = states('sensor.micemob_area') | trim %}
          {% set fallback = states('person.simplemice') %}

          {% set location = area if area not in ['unknown','unavailable',''] else fallback %}

          {% if location == 'Bedroom' and (now().hour >= 22 or now().hour < 8) %}
            Sleep
          {% elif location in ['Bangtao Office','Maya Beach'] %}
            At Work
          {% elif location in ['SuperCheap','Tops Rawai','Makro Rawai','Makro Chalong'] %}
            At Food Store
          {% elif location in ['unknown','unavailable','not_home',''] %}
            {{ state_attr('sensor.micemob_location','sub_administrative_area') }}
            {{ state_attr('sensor.micemob_location','location') }}
          {% else %}
            {{ location }}
          {% endif %}

  ###########################################################################
  # SPEED
  ###########################################################################

  - sensor:
      - name: Simplemice Speed km/h
        unique_id: simplemice_speed
        unit_of_measurement: km/h
        state: >
          {% set speed = state_attr('device_tracker.micemob','speed') %}
          {{ (speed | float(0) * 3.6) | round(1) }}
