#############################################
# UTILITY METERS (Daily / Monthly / Yearly)
#############################################

utility_meter:
  water_daily:
    source: sensor.water_usage_total_l
    cycle: daily

  water_weekly:
    source: sensor.water_usage_total_l
    cycle: weekly

  water_monthly:
    source: sensor.water_usage_total_l
    cycle: monthly

  water_yearly:
    source: sensor.water_usage_total_l
    cycle: yearly
