###############################################################################
# Bathroom Light Package
# - Motion + door based entry detection
# - Smooth light on
# - After 20 minutes -> red flash warning
# - After 5 minutes of no motion -> turn off
###############################################################################

binary_sensor:
  - platform: bayesian
    unique_id: bathroom_occupied_hyman
    name: "Bathroom Occupied by Humans"
    prior: 0.3
    probability_threshold: 0.5
    observations:
      - entity_id: "binary_sensor.bathroom_motion_occupancy"
        prob_given_true: 0.95
        prob_given_false: 0.33
        platform: "state"
        to_state: "on"

input_boolean:
  bathroom_occupied:
    name: Bathroom Occupied
    icon: mdi:account

timer:
  bathroom_long_occupancy:
    name: Bathroom Long Occupancy
    duration: "00:20:00"

automation:
  ###############################################################################
  # Automation 1 - Start session on door open OR motion detected
  # FIX: added motion trigger so session starts even if door doesn't open
  # FIX: changed condition from motion=off to occupied=off
  ###############################################################################
  - id: bathroom_start_session
    alias: "Bathroom - Start Session"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.bathroom_door_contact
        to: "on"
      - platform: state
        entity_id: binary_sensor.bathroom_motion_occupancy
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.bathroom_occupied
        state: "off"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.bathroom_occupied
      - service: light.turn_on
        target:
          entity_id: light.bathroom_bulb
        data:
          brightness: 200
      - service: timer.start
        target:
          entity_id: timer.bathroom_long_occupancy

  ###############################################################################
  # Automation 2 - Keep session alive: reset 20-min timer on every motion event
  # FIX: new automation - prevents timer finishing while person is still moving
  ###############################################################################
  - id: bathroom_motion_keepalive
    alias: "Bathroom - Motion Keep Alive"
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.bathroom_motion_occupancy
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.bathroom_occupied
        state: "on"
    action:
      - service: timer.start
        target:
          entity_id: timer.bathroom_long_occupancy

  ###############################################################################
  # Automation 3 - End session (no motion for 5 min AND timer not active)
  # FIX: was 2min - 5min gives stationary users more time before light turns off
  # FIX: added condition timer=idle so session doesn't end DURING active 20-min session
  ###############################################################################
  - id: bathroom_end_session
    alias: "Bathroom - End Session (no motion 5min)"
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.bathroom_motion_occupancy
        to: "off"
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.bathroom_occupied
        state: "on"
      - condition: state
        entity_id: timer.bathroom_long_occupancy
        state: "idle"
    action:
      - service: light.turn_off
        target:
          entity_id: light.bathroom_bulb
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.bathroom_occupied

  ###############################################################################
  # Automation 4 - End session after alert fired (cleanup)
  ###############################################################################
  - id: bathroom_end_session_post_alert
    alias: "Bathroom - End Session After Alert"
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.bathroom_motion_occupancy
        to: "off"
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.bathroom_occupied
        state: "on"
      - condition: state
        entity_id: timer.bathroom_long_occupancy
        state: "active"
    action:
      - service: light.turn_off
        target:
          entity_id: light.bathroom_bulb
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.bathroom_occupied
      - service: timer.cancel
        target:
          entity_id: timer.bathroom_long_occupancy

  ###############################################################################
  # Automation 5 - Long occupancy alert at 20 minutes
  # FIX: was labeled 10min - now correctly 20min
  # FIX: removed timer.start at end - was restarting timer causing repeat alerts
  ###############################################################################
  - id: bathroom_long_occupancy_alert
    alias: "Bathroom - Long Occupancy Alert (20min)"
    mode: single
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.bathroom_long_occupancy
    condition:
      - condition: state
        entity_id: input_boolean.bathroom_occupied
        state: "on"
    action:
      - service: light.turn_on
        target:
          entity_id: light.bathroom_bulb
        data:
          color_name: "red"
          brightness: 255
      - repeat:
          count: 3
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.bathroom_bulb
              data:
                flash: short
            - delay: "00:00:02"
      - service: light.turn_on
        target:
          entity_id: light.bathroom_bulb
        data:
          brightness: 200
          color_temp: 4000
