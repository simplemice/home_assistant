###############################################################################
#   @author         :   Simplemice
#   @date           :   27/01/2024
#   @package        :   Multiroom Music
#   @description    :   A collection of Home Assistant Sensors
###############################################################################

###############################################################################
# HELPERS (REQUIRED FOR TTS CONTROL)
###############################################################################

input_text:
  ma_saved_group:
    name: MA Saved Group
    max: 255

input_boolean:
  ma_was_playing:
    name: MA Was Playing Before TTS

###############################################################################
# TEMPLATE
###############################################################################

template:
  - trigger:
      - platform: homeassistant
        event: start
    sensor:
      - name: ma_all_rooms
        state: >
          {{ [
            'media_player.livingroom_player',
            'media_player.bedroom_player',
            'media_player.kitchen_player'
          ] | join(',') }}

###############################################################################
# SCRIPTS
###############################################################################

script:
  ###############################################################################
  # JOIN ROOMS
  ###############################################################################
  ma_join_rooms:
    alias: MA Join Rooms
    mode: restart
    fields:
      master:
        description: Master player entity
        example: media_player.livingroom_player
      members:
        description: Players to join
        example: media_player.kitchen_player,media_player.bedroom_player
    sequence:
      - service: media_player.join
        target:
          entity_id: "{{ master }}"
        data:
          group_members: >
            {% if members is string %}
              {{ members.split(',') | map('trim') | list }}
            {% else %}
              {{ members }}
            {% endif %}

  ###############################################################################
  # UNJOIN ROOMS
  ###############################################################################
  ma_unjoin_rooms:
    alias: "MA Unjoin Rooms"
    mode: parallel
    fields:
      members:
        description: "Players to unjoin"
    sequence:
      - condition: template
        value_template: "{{ members is not none and members | length > 0 }}"
      # Instead of 'unjoin', we use 'stop' which breaks the sync in MA
      - action: media_player.media_stop
        target:
          entity_id: >
            {% if members is string %}
              {{ members.split(',') | map('trim') | list }}
            {% else %}
              {{ members }}
            {% endif %}

  ###############################################################################
  # PLAY EVERYWHERE
  ###############################################################################
  ma_play_everywhere:
    alias: Music Everywhere
    mode: restart
    sequence:
      - service: script.ma_unjoin_rooms
        data:
          members:
            - media_player.bedroom_player
            - media_player.kitchen_player
      - delay: 1
      - service: script.ma_join_rooms
        data:
          master: media_player.livingroom_player
          members:
            - media_player.bedroom_player
            - media_player.kitchen_player
      - delay: 2
      - service: media_player.play_media
        target:
          entity_id: media_player.livingroom_player
        data:
          media_content_type: music
          media_content_id: "library://favorites"

  ###############################################################################
  # TOGGLE ROOM
  ###############################################################################
  ma_toggle_room:
    alias: Toggle Room Audio
    mode: queued
    fields:
      room:
        description: Room player entity
        example: media_player.kitchen_player
    sequence:
      - choose:
          - conditions: >
              {{ state_attr('media_player.livingroom_player','group_members')
                 and room in state_attr('media_player.livingroom_player','group_members') }}
            sequence:
              - service: media_player.unjoin
                target:
                  entity_id: "{{ room }}"
        default:
          - service: media_player.join
            target:
              entity_id: media_player.livingroom_player
            data:
              group_members:
                - "{{ room }}"

  ###############################################################################
  # ===== TTS PREPARE
  ###############################################################################
  ma_prepare_tts:
    alias: "MA Prepare TTS"
    mode: restart
    fields:
      speaker:
        description: "Speaker used for TTS"
    sequence:
      - variables:
          followers: "{{ state_attr(speaker, 'group_members') | default([], true) }}"
          was_playing: "{{ is_state(speaker, 'playing') }}"
      # Save followers
      - action: input_text.set_value
        target:
          entity_id: input_text.ma_saved_group
        data:
          value: "{{ followers | join(',') if followers else '' }}"
      # Save state
      - action: >
          {% if was_playing %} input_boolean.turn_on {% else %} input_boolean.turn_off {% endif %}
        target:
          entity_id: input_boolean.ma_was_playing
      # Use the 'stop' method to break the group
      - if:
          - condition: template
            value_template: "{{ followers | length > 0 }}"
        then:
          - action: script.ma_unjoin_rooms
            data:
              members: "{{ followers }}"
          - delay: 1 # Give the MA server time to process the group break

  ###############################################################################
  # RESTORE MASTER ONLY (KEY FIX)
  ###############################################################################
  ma_restore_master_only:
    alias: Restore Master Playback Only
    mode: restart
    sequence:
      - delay: 2
      - service: script.ma_unjoin_rooms
        data:
          members:
            - media_player.bedroom_player
            - media_player.kitchen_player
      - delay: 1
      - condition: template
        value_template: >
          {{ is_state('media_player.livingroom_player','paused') }}
      - service: media_player.media_play
        target:
          entity_id: media_player.livingroom_player

###############################################################################
# AUTOMATIONS
###############################################################################

automation:
  - alias: Join kitchen when occupied
    trigger:
      - platform: state
        entity_id: binary_sensor.kitchen_wall_presense_detector_presence
        to: "on"
    action:
      - service: script.ma_toggle_room
        data:
          room: media_player.kitchen_player

  - alias: Normalize joined volume
    trigger:
      - platform: state
        entity_id: media_player.livingroom_player
        attribute: group_members
    action:
      - service: media_player.volume_set
        target:
          entity_id:
            - media_player.bedroom_player
            - media_player.kitchen_player
        data:
          volume_level: 0.35

  ###############################################################################
  # AUTO FIX AFTER ANNOUNCEMENT
  ###############################################################################
  - alias: Fix Resume After Announcement
    mode: restart
    trigger:
      - platform: state
        entity_id: media_player.livingroom_player
        attribute: media_content_type
        from: "announcement"
    action:
      - service: script.ma_restore_master_only
