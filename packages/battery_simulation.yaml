###############################################################################
# @package     : Battery Simulation
# @description : Stateful Battery Logic (Charges from Solar + Wind)
###############################################################################

template:
  - sensor:
      # Combine Solar and Wind for the Battery logic
      - name: "Battery Charge Power Total"
        unique_id: battery_charge_power_total
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set solar = states('sensor.solar_live_power_simulated') | float(0) %}
          {% set wind = states('sensor.wind_turbine_power_simulated') | float(0) %}
          {{ (solar + wind) | round(1) }}

      - name: "Battery Power (Simulated)"
        unique_id: battery_power_simulated
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-sync
        availability: >
          {{ is_number(states('sensor.battery_charge_power_total')) and 
             is_number(states('sensor.battery_energy_remaining')) }}
        state: >
          {% set generation = states('sensor.battery_charge_power_total') | float(0) %}
          {% set load = states('sensor.sim_home_power') | float(0) %}
          {% set energy = states('sensor.battery_energy_remaining') | float(0) %}
          {% set CAP = 50.0 %}
          {% set MAX_CHARGE = 5800 %}
          {% set MAX_DISCHARGE = 6700 %}

          {% set net_flow = generation - load %}
          {% if net_flow > 0 %}
            {# Charge: limit by max rate and capacity #}
            {% if energy >= (CAP * 0.99) %} 0
            {% else %} {{ [net_flow, MAX_CHARGE] | min | round(0) }}
            {% endif %}
          {% else %}
            {# Discharge: limit by max rate and SoC limit #}
            {% if energy <= (CAP * 0.1) %} 0
            {% else %} {{ [net_flow, -MAX_DISCHARGE] | max | round(0) }}
            {% endif %}
          {% endif %}

      - name: "Battery Discharge Power (Home)"
        unique_id: battery_discharge_power_home
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set p = states('sensor.battery_power_simulated') | float(0) %}
          {{ p | abs if p < 0 else 0 }}

      - name: "Battery Charge Power (Actual)"
        unique_id: battery_charge_power_actual
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set p = states('sensor.battery_power_simulated') | float(0) %}
          {{ p if p > 0 else 0 }}

  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: homeassistant
        event: start
    sensor:
      - name: "Battery Energy Remaining"
        unique_id: battery_energy_remaining
        unit_of_measurement: "kWh"
        device_class: energy
        state: >
          {% set CAP = 50.0 %}
          {% set EFF = 0.94 %}
          {% set last = states('sensor.battery_energy_remaining') | float(CAP * 0.5) %}
          {% set charge = states('sensor.battery_charge_power_actual') | float(0) %}
          {% set discharge = states('sensor.battery_discharge_power_home') | float(0) %}
          {# (W / 1000) / 60 = kWh per minute #}
          {% set delta = ((charge * EFF) - discharge) / 60000 %}
          {{ [[(last + delta), CAP] | min, 0] | max | round(4) }}

      - name: "Battery SOC (Simulated)"
        unique_id: battery_soc_simulated
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {% set e = states('sensor.battery_energy_remaining') | float(0) %}
          {{ (e / 50 * 100) | round(1) }}

  - sensor:
      - name: "Battery BMS State"
        unique_id: battery_bms_state
        icon: mdi:battery-check
        state: >
          {% set soc = states('sensor.battery_soc_simulated') | float(0) %}
          {% set p = states('sensor.battery_power_simulated') | float(0) %}
          {% if soc <= 10.5 %} "Protection: Low SoC"
          {% elif soc >= 98.5 and p >= 0 %} "Standby: Full"
          {% elif p > 10 %} "Charging"
          {% elif p < -10 %} "Discharging"
          {% else %} "Idle"
          {% endif %}

      - name: "Battery Runtime Remaining"
        unique_id: battery_runtime_remaining
        unit_of_measurement: "h"
        icon: mdi:timer-outline
        state: >
          {% set e = states('sensor.battery_energy_remaining') | float(0) %}
          {% set load = states('sensor.battery_discharge_power_home') | float(0) %}
          {# Avoid division by zero, only calculate if discharging > 50W #}
          {% if load > 50 %}
            {{ (e / (load / 1000)) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Battery Charge Power Total"
        unique_id: battery_charge_power_total
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set solar = states('sensor.solar_live_power_simulated') | float(0) %}
          {% set wind = states('sensor.wind_battery_charge_power') | float(0) %}
          {{ (solar + wind) | round(1) }}

sensor:
  - platform: integration
    source: sensor.battery_charge_power_actual
    name: "Total Battery Energy In"
    unique_id: total_battery_energy_in
    method: left
    unit_prefix: k
  - platform: integration
    source: sensor.battery_discharge_power_home
    name: "Total Battery Energy Out"
    unique_id: total_battery_energy_out
    method: left
    unit_prefix: k
