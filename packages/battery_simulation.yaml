###############################################################################
# @author      : Simplemice
# @package     : Energy
# @description : Realistic Battery Simulation (Solar-driven, STABLE)
###############################################################################

template:
  ###########################################################################
  # 1️⃣ BATTERY POWER FLOW (SINGLE SOURCE OF TRUTH)
  ###########################################################################
  - sensor:
      - name: "Battery Power (Simulated)"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-sync
        state: >
          {% set solar = states('sensor.solar_live_power_simulated') | float(0) %}
          {% set load  = states('sensor.sim_home_power') | float(0) %}
          {% set energy = states('sensor.battery_energy_remaining') | float(0) %}
          {% set CAP = 50 %}
          {% set MIN_ENERGY = CAP * 0.10 %}
          {% set max_charge = 5800 %}
          {% set max_discharge = 6700 %}
          {# Low SOC: block discharge ONLY #}
          {% if energy <= MIN_ENERGY %}
            {% if solar > load %}
              {{ [solar - load, max_charge] | min | round(0) }}
            {% else %}
              0
            {% endif %}
          {# Normal operation #}
          {% elif solar > load %}
            {{ [solar - load, max_charge] | min | round(0) }}
          {% else %}
            {{ -1 * ([load - solar, max_discharge] | min) | round(0) }}
          {% endif %}

      ###########################################################################
      # 2️⃣ CHARGE / DISCHARGE SPLIT (DERIVED, SAFE)
      ###########################################################################
      - name: "Battery Charge Power (Solar)"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging
        state: >
          {% set p = states('sensor.battery_power_simulated') | float(0) %}
          {{ p if p > 0 else 0 }}

      - name: "Battery Discharge Power (Home)"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-minus
        state: >
          {% set p = states('sensor.battery_power_simulated') | float(0) %}
          {{ -p if p < 0 else 0 }}

      - name: "Battery Charge Power (Total)"
        unique_id: battery_charge_power_total
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-arrow-up
        state: >
          {% set solar = states('sensor.battery_charge_power_solar') | float(0) %}
          {% set wind  = states('sensor.wind_battery_charge_power') | float(0) %}
          {{ (solar + wind) | round(1) }}
  ###########################################################################
  # 3️⃣ BATTERY ENERGY REMAINING (STATEFUL, NO HELPERS)
  ###########################################################################
  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: homeassistant
        event: start
    sensor:
      - name: "Battery Energy Remaining"
        unique_id: battery_energy_remaining
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:battery
        state: >
          {% set CAP = 40 %}
          {% set last = states('sensor.battery_energy_remaining') | float(CAP) %}
          {% set charge =
              states('sensor.battery_charge_power_solar') | float(0)
            + states('sensor.wind_battery_charge_power') | float(0) %}
          {% set discharge = states('sensor.battery_discharge_power_home') | float(0) %}
          {# BMS limits #}
          {% if last <= CAP * 0.10 %}
            {% set discharge = 0 %}
          {% elif last >= CAP * 0.99 %}
            {% set charge = 0.5 %}
          {% endif %}
          {% set delta = (charge - discharge) / 60000 %}
          {{ [ [last + delta, CAP] | min, 0 ] | max | round(3) }}

  ###########################################################################
  # 4️⃣ BATTERY SOC
  ###########################################################################
  - sensor:
      - name: "Battery SOC (Simulated)"
        unique_id: battery_soc_simulated
        unit_of_measurement: "%"
        device_class: battery
        icon: mdi:battery
        # Use availability to ensure we don't calculate on 'unknown' energy
        state: >
          {% set energy = states('sensor.battery_energy_remaining') %}
          {% if is_number(energy) %}
            {{ (energy | float / 40 * 100) | round(1) }}
          {% else %}
            unavailable
          {% endif %}

      ###########################################################################
      # 5️⃣ BMS STATE
      ###########################################################################
      - name: "Battery BMS State"
        icon: mdi:battery-alert
        state: >
          {% set soc = states('sensor.battery_soc_simulated') | float(0) %}
          {% set p = states('sensor.battery_power_simulated') | float(0) %}
          {% if soc <= 10 %}
            Protection: Low SoC
          {% elif soc >= 98 and p > 0 %}
            Charge Cutoff
          {% elif p > 0 %}
            Charging
          {% elif p < 0 %}
            Discharging
          {% else %}
            Idle
          {% endif %}

      ###########################################################################
      # 6️⃣ RUNTIME
      ###########################################################################
      - name: "Battery Runtime Remaining"
        unit_of_measurement: "h"
        icon: mdi:timer
        state: >
          {% set e = states('sensor.battery_energy_remaining') | float(0) %}
          {% set load = states('sensor.sim_home_power') | float(0) %}
          {% if load > 0 %}
            {{ (e / (load / 1000)) | round(1) }}
          {% else %}
            unknown
          {% endif %}

###############################################################################
# 7️⃣ ENERGY STATISTICS (DASHBOARD ONLY)
###############################################################################
sensor:
  - platform: integration
    source: sensor.battery_charge_power_solar
    name: Battery Charged Energy
    unit_prefix: k
    round: 3

  - platform: integration
    source: sensor.battery_discharge_power_home
    name: Battery Discharged Energy
    unit_prefix: k
    round: 3

###############################################################################
# 8️⃣ UTILITY METERS
###############################################################################
utility_meter:
  battery_charge_daily:
    source: sensor.battery_charged_energy
    cycle: daily

  battery_discharge_daily:
    source: sensor.battery_discharged_energy
    cycle: daily
