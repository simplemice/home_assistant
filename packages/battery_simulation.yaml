template:
  - sensor:
      - name: "Battery Charge Power Solar"
        unique_id: battery_charge_power_solar
        state: >
          {{ states('sensor.solar_power_to_battery') | float(0) | round(1) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power-variant

      - name: "Battery Charge Power Total"
        unique_id: battery_charge_power_total
        state: >
          {% set solar_to_bat = states('sensor.solar_power_to_battery') | float(0) %}
          {% set wind_to_bat  = states('sensor.wind_battery_charge_power') | float(0)
          %}
          {% set soc          = states('sensor.battery_soc_simulated') | float(0) %}
          {% if soc >= 100 %}{{ 0 }}
          {% else %}{{ [solar_to_bat + wind_to_bat, 3000] | min | round(1) }}{% endif
          %}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging

      - name: "Battery Charge Power (Actual)"
        unique_id: battery_charge_power_actual
        state: >
          {{ states('sensor.battery_charge_power_total') | float(0) | round(1) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging-high

      - name: "Battery Discharge Power Home"
        unique_id: battery_discharge_power_home
        state: >
          {% set home       = states('sensor.sim_home_power') | float(0) %}
          {% set solar_home = states('sensor.solar_power_to_home') | float(0) %}
          {% set soc        = states('sensor.battery_soc_simulated') | float(50) %}
          {% if soc <= 10 %}{{ 0 }}
          {% else %}{{ [home - solar_home, 0] | max | round(1) }}{% endif %}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:home-battery

      - name: "Battery Power (Simulated)"
        unique_id: battery_power_simulated
        state: >
          {% set charge    = states('sensor.battery_charge_power_total') | float(0) %}
          {% set discharge = states('sensor.battery_discharge_power_home') | float(0)
          %}
          {{ (charge - discharge) | round(0) | int }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-sync

      - name: "Battery Power (Simulated) Inverted"
        unique_id: battery_power_simulated_inverted
        state: >
          {{ states('sensor.battery_discharge_power_home') | float(0) | round(1) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement

      - name: "Battery BMS State"
        unique_id: battery_bms_state
        state: >
          {% set net = states('sensor.battery_power_simulated') | float(0) %}
          {% set soc = states('sensor.battery_soc_simulated') | float(0) %}
          {% if soc >= 100 and net >= 0 %}Full
          {% elif net > 10 %}Charging
          {% elif net < -10 %}Discharging
          {% else %}Idle{% endif %}

      - name: "Battery Energy Remaining"
        unique_id: battery_energy_remaining
        state: >
          {% set initial    = 12.02 %}
          {% set energy_in  = states('sensor.total_battery_energy_in')  | float(0) %}
          {% set energy_out = states('sensor.total_battery_energy_out') | float(0) %}
          {% set remaining  = initial + energy_in - energy_out %}
          {{ [[remaining, 0] | max, 50.0] | min | round(3) }}
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        icon: mdi:battery-high

      - name: "Battery SOC (Simulated)"
        unique_id: battery_soc_simulated
        state: >
          {% set remaining = states('sensor.battery_energy_remaining') | float(0) %}
          {{ [[remaining / 50.0 * 100, 0] | max, 100] | min | round(1) }}
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement

      - name: "Battery Runtime Remaining"
        unique_id: battery_runtime_remaining
        state: >
          {% set discharge = states('sensor.battery_discharge_power_home') | float(0)
          %}
          {% set remaining = states('sensor.battery_energy_remaining') | float(0) %}
          {% set usable    = [remaining - 5.0, 0] | max %}
          {% if discharge > 10 %}{{ (usable / (discharge / 1000)) | round(1) }}
          {% else %}{{ 999 }}{% endif %}
        unit_of_measurement: "h"
        device_class: duration
        icon: mdi:timer-check
sensor:
  - platform: integration
    source: sensor.battery_charge_power_total
    name: total_battery_energy_in
    unique_id: total_battery_energy_in
    unit_prefix: k
    round: 3
    method: left

  - platform: integration
    source: sensor.battery_discharge_power_home
    name: total_battery_energy_out
    unique_id: total_battery_energy_out
    unit_prefix: k
    round: 3
    method: left

  - platform: integration
    source: sensor.sim_home_power
    name: sim_home_energy_kwh
    unique_id: sim_home_energy_kwh
    unit_prefix: k
    round: 3
    method: trapezoidal

utility_meter:
  battery_charge_daily:
    source: sensor.total_battery_energy_in
    cycle: daily

  battery_discharge_daily:
    source: sensor.total_battery_energy_out
    cycle: daily
