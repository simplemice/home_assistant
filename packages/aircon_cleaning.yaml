###############################################################################
#   @author         :   Simplemice
#   @date           :   01/09/2025
#   @package        :   Aircon Service
#   @description    :   Tracks last AC cleaning date and sends reminders.
###############################################################################

# ─── Inputs ────────────────────────────────────────────────────────────────
input_datetime:
  aircon_last_cleaned:
    name: Aircon Last Cleaned
    has_date: true
    has_time: false

# ─── Sensors ───────────────────────────────────────────────────────────────
template:
  - sensor:
      - name: "Aircon Days Until Next Clean"
        unique_id: aircon_days_until_next_clean
        unit_of_measurement: "days"
        state: >-
          {% set last_clean = states('input_datetime.aircon_last_cleaned') %}
          {% if last_clean not in ['unknown','unavailable',''] %}
            {% set last_ts = as_timestamp(last_clean) %}
            {% if last_ts %}
              {{ ((last_ts + 120*86400) - now().timestamp()) // 86400 }}
            {% else %}
              unknown
            {% endif %}
          {% else %}
            unknown
          {% endif %}
        attributes:
          next_clean_date: >-
            {% set last_clean = states('input_datetime.aircon_last_cleaned') %}
            {% if last_clean not in ['unknown','unavailable',''] %}
              {% set last_ts = as_timestamp(last_clean) %}
              {% if last_ts %}
                {{ (last_ts + 120*86400) | timestamp_custom('%Y-%m-%d') }}
              {% endif %}
            {% endif %}
