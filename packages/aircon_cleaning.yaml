###############################################################################
#   @author         :   Simplemice
#   @date           :   01/09/2025
#   @package        :   Aircon Service
#   @description    :   Tracks last AC cleaning date and sends reminders.
###############################################################################

# ─── Inputs ────────────────────────────────────────────────────────────────
input_datetime:
  aircon_last_cleaned:
    name: Aircon Last Cleaned
    has_date: true
    has_time: false

# ─── Sensors ───────────────────────────────────────────────────────────────
template:
  - sensor:
      - name: "Aircon Days Until Next Clean"
        unique_id: aircon_days_until_next_clean
        unit_of_measurement: "days"
        state: >-
          {% set last_clean = states('input_datetime.aircon_last_cleaned') %}
          {% if last_clean not in ['unknown','unavailable',''] %}
            {% set last_ts = as_timestamp(last_clean) %}
            {% if last_ts %}
              {{ ((last_ts + 120*86400) - now().timestamp()) // 86400 }}
            {% else %}
              unknown
            {% endif %}
          {% else %}
            unknown
          {% endif %}
        attributes:
          next_clean_date: >-
            {% set last_clean = states('input_datetime.aircon_last_cleaned') %}
            {% if last_clean not in ['unknown','unavailable',''] %}
              {% set last_ts = as_timestamp(last_clean) %}
              {% if last_ts %}
                {{ (last_ts + 120*86400) | timestamp_custom('%Y-%m-%d') }}
              {% endif %}
            {% endif %}

# ─── Scripts ───────────────────────────────────────────────────────────────
script:
  aircon_cleaned_now:
    alias: "Aircon Cleaned Now"
    mode: single
    icon: mdi:air-conditioner
    sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.aircon_last_cleaned
        data:
          date: "{{ now().date() }}"
      - service: calendar.create_event
        target:
          entity_id: calendar.house_planner
        data:
          summary: "Service Day"
          start: "{{ as_local((now() + timedelta(days=120)).replace(hour=9, minute=0)) }}"
          end: "{{ as_local((now() + timedelta(days=120)).replace(hour=10, minute=0)) }}"

# ─── Automations ───────────────────────────────────────────────────────────
automation:
  - id: remind_aircon_clean
    alias: "Remind to Clean Aircon"
    mode: single
    triggers:
      # Specific reminder times
      - platform: time
        at: "07:30:00"
      - platform: time
        at: "08:00:00"
      - platform: time
        at: "08:30:00"
      - platform: time
        at: "09:00:00"
      - platform: time
        at: "15:00:00"
      - platform: time
        at: "19:00:00"
      # Restart safety net
      - platform: homeassistant
        event: start
    actions:
      - choose:
          # Case 1: Tomorrow reminders → 09/15/19
          - conditions:
              - condition: template
                value_template: >-
                  {{ is_number(states('sensor.aircon_days_until_next_clean'))
                     and states('sensor.aircon_days_until_next_clean')|int == 1
                     and now().strftime('%H:%M:%S') in ['09:00:00','15:00:00','19:00:00'] }}
            sequence:
              - service: script.choose_way_to_send_announcements
                data:
                  message: >-
                    {{ [
                      "Reminder: Your aircon needs cleaning tomorrow!",
                      "Tomorrow is Aircon cleaning day!",
                      "Don’t forget to call Aircon Service tomorrow!"
                    ] | random }}
          # Case 2: Today reminders → 07:30/08:00/08:30
          - conditions:
              - condition: template
                value_template: >-
                  {{ is_number(states('sensor.aircon_days_until_next_clean'))
                     and states('sensor.aircon_days_until_next_clean')|int == 0
                     and now().strftime('%H:%M:%S') in ['07:30:00','08:00:00','08:30:00'] }}
            sequence:
              - service: script.choose_way_to_send_announcements
                data:
                  message: >-
                    {{ [
                      "Today is Aircon cleaning day!",
                      "Aircon service is due today — don’t miss it!",
                      "Reminder: Please clean the aircon today!"
                    ] | random }}
          # Case 3: Fallback on restart
          - conditions:
              - condition: trigger
                id: homeassistant
            sequence:
              - variables:
                  now_time: "{{ now().strftime('%H:%M') }}"
              - choose:
                  - conditions: >-
                      {{ is_number(states('sensor.aircon_days_until_next_clean'))
                         and states('sensor.aircon_days_until_next_clean')|int == 0
                         and '07:30' <= now_time < '09:00' }}
                    sequence:
                      - service: script.choose_way_to_send_announcements
                        data:
                          message: "⚠️ Fallback: Aircon cleaning is due today (missed early reminder)."
                  - conditions: >-
                      {{ is_number(states('sensor.aircon_days_until_next_clean'))
                         and states('sensor.aircon_days_until_next_clean')|int == 1
                         and '09:00' <= now_time < '15:00' }}
                    sequence:
                      - service: script.choose_way_to_send_announcements
                        data:
                          message: "⚠️ Fallback: Reminder for Aircon cleaning tomorrow (missed 9AM reminder)."
