###############################################################################
#   @author         :   Simplemice
#   @date           :   07/10/2025
#   @package        :   Gas Usage
#   @description    :   Smart gas tracking, cost, and Energy Dashboard integration.
###############################################################################

############################
# INPUT
############################

input_number:
  gas_tariff_rate:
    name: Gas Tariff Rate
    min: 0
    max: 100
    step: 0.01
    mode: box
    unit_of_measurement: "THB/L"
    icon: mdi:currency-thb

############################
# FILTER + INTEGRATION
############################

sensor:
  - platform: filter
    name: Filtered Gas Volume
    unique_id: filtered_gas_volume
    entity_id: sensor.kitchen_gas_scale_gas_volume
    filters:
      - filter: outlier
        window_size: 5
        radius: 0.3
      - filter: lowpass
        time_constant: 8

  - platform: integration
    source: sensor.gas_consumption_signal
    name: Gas Used
    unique_id: gas_used_total
    method: trapezoidal
    round: 3

############################
# TEMPLATE (SAFE MODE)
############################

template:
  - trigger:
      - platform: state
        entity_id: sensor.filtered_gas_volume
    sensor:
      - name: Gas Consumption Signal
        unique_id: gas_consumption_signal
        unit_of_measurement: "L"
        device_class: gas
        state_class: measurement
        icon: mdi:fire
        state: >
          {{ states('sensor.filtered_gas_volume')|float(0) * -1 }}

      - name: Gas Usage m3
        unique_id: gas_used_m3
        unit_of_measurement: "m³"
        device_class: gas
        state_class: total_increasing
        icon: mdi:meter-cubic
        state: >
          {{ (states('sensor.gas_used')|float(0) / 1000) | round(4) }}

      - name: Gas Cost
        unique_id: gas_cost_total
        unit_of_measurement: "THB"
        device_class: monetary
        state_class: total
        icon: mdi:cash
        state: >
          {{ states('sensor.gas_used')|float(0)
             * states('input_number.gas_tariff_rate')|float(0) }}

  - binary_sensor:
      - delay_off: 0:02:00
        default_entity_id: binary_sensor.gas_tank_refilled
        name: Gas Tank Refilled
        state:
          "{% set delta =\n  states('sensor.filtered_gas_volume')|float(0)\n  -\n
          \ states('sensor.filtered_gas_volume', 2)|float(0)\n%} {{ delta > 2 }}"

###############################################################################
# UTILITY METERS (AUTOMATIC PERIOD TRACKING)
###############################################################################

utility_meter:
  gas_daily:
    name: Gas Daily
    source: sensor.gas_used
    cycle: daily

  gas_monthly:
    name: Gas Monthly
    source: sensor.gas_used
    cycle: monthly

  gas_yearly:
    name: Gas Yearly
    source: sensor.gas_used
    cycle: yearly
