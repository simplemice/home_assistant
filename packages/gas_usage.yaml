###############################################################################
#   @author         :   Simplemice
#   @package        :   Gas Usage
#   @description    :   Gas tracking with filtering, delta usage, cost
###############################################################################

template:
  - trigger:
      - platform: state
        entity_id: sensor.kitchen_gas_scale_gas_volume
        not_to:
          - "unknown"
          - "unavailable"
    sensor:
      - name: "Gas Used Total"
        unique_id: gas_used_total
        unit_of_measurement: "L"
        device_class: gas
        state_class: total_increasing
        state: >
          {% set current = states('sensor.kitchen_gas_scale_gas_volume') | float(0) %}
          {% set previous = trigger.from_state.state | float(0) if trigger.from_state else current %}
          {% set used = previous - current %}
          {% if used > 0 %}
            {{ (states('sensor.gas_used_total') | float(0) + used) | round(3) }}
          {% else %}
            {{ states('sensor.gas_used_total') | float(0) }}
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.kitchen_gas_scale_gas_volume
    binary_sensor:
      - name: "Gas Tank Refilled"
        state: >
          {{ (trigger.to_state.state | float(0)) > (trigger.from_state.state | float(0) + 1) }}
