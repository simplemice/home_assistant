###############################################################################
#   @author         :   Simplemice
#   @package        :   Gas Usage (FINAL - Clean & Stable)
#   @description    :   Smart gas tracking with filtering, integration, cost
###############################################################################

############################
# INPUTS
############################
input_number:
  gas_tariff_rate:
    name: "Gas Tariff Rate"
    min: 0
    max: 100
    step: 0.01
    mode: box
    unit_of_measurement: "THB/L"
    icon: mdi:currency-thb

############################
# FILTER (RAW SENSOR CLEANUP)
############################
sensor:
  - platform: filter
    name: "Filtered Gas Volume"
    unique_id: filtered_gas_volume
    entity_id: sensor.kitchen_gas_scale_gas_volume
    filters:
      - filter: outlier
        window_size: 5
        radius: 0.3
      - filter: lowpass
        time_constant: 8

  ###########################################################################
  # INTEGRATION (RIEMANN SUM)
  ###########################################################################
  - platform: integration
    source: sensor.gas_consumption_signal
    name: "Gas Used Total"
    unique_id: gas_used_total
    method: trapezoidal
    round: 3

############################
# TEMPLATE ENTITIES
############################
template:
  # Trigger-based block for dynamic logic (Refills & Signal)
  - trigger:
      - platform: state
        entity_id: sensor.filtered_gas_volume
    sensor:
      - name: "Gas Consumption Signal"
        unique_id: gas_consumption_signal
        unit_of_measurement: "L"
        device_class: gas
        state_class: measurement
        icon: mdi:fire
        # We take the absolute change or invert the scale drop to show "usage"
        state: >
          {{ states('sensor.filtered_gas_volume') | float(0) }}

    binary_sensor:
      - name: "Gas Tank Refilled"
        unique_id: gas_tank_refilled
        delay_off: "00:02:00"
        device_class: update
        state: >
          {% if trigger.from_state is not none and trigger.to_state is not none %}
            {% set current = trigger.to_state.state | float(0) %}
            {% set previous = trigger.from_state.state | float(0) %}
            {{ (current - previous) > 2.0 }}
          {% else %}
            false
          {% endif %}

  # Standard Sensors for derived values
  - sensor:
      - name: "Gas Usage m3"
        unique_id: gas_used_m3
        unit_of_measurement: "m³"
        device_class: gas
        state_class: total_increasing
        icon: mdi:meter-cubic
        state: >
          {{ (states('sensor.gas_used_total') | float(0) / 1000) | round(4) }}

      - name: "Gas Cost"
        unique_id: gas_cost_total
        unit_of_measurement: "THB"
        device_class: monetary
        state_class: total
        icon: mdi:cash
        state: >
          {% set usage = states('sensor.gas_used_total') | float(0) %}
          {% set rate = states('input_number.gas_tariff_rate') | float(0) %}
          {{ (usage * rate) | round(2) }}

############################
# UTILITY METERS
############################
utility_meter:
  gas_daily:
    source: sensor.gas_used_total
    name: "Gas Daily"
    cycle: daily

  gas_monthly:
    source: sensor.gas_used_total
    name: "Gas Monthly"
    cycle: monthly

  gas_yearly:
    source: sensor.gas_used_total
    name: "Gas Yearly"
    cycle: yearly
