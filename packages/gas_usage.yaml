###############################################################################
#   @author         :   Simplemice
#   @package        :   Gas Usage (FINAL - Clean & Stable)
#   @description    :   Smart gas tracking with filtering, integration, cost
###############################################################################

############################
# INPUT
############################

input_number:
  gas_tariff_rate:
    name: Gas Tariff Rate
    min: 0
    max: 100
    step: 0.01
    mode: box
    unit_of_measurement: "THB/L"
    icon: mdi:currency-thb

############################
# FILTER (RAW SENSOR CLEANUP)
############################

sensor:
  - platform: filter
    name: Filtered Gas Volume
    unique_id: filtered_gas_volume
    entity_id: sensor.kitchen_gas_scale_gas_volume
    filters:
      - filter: outlier
        window_size: 5
        radius: 0.3
      - filter: lowpass
        time_constant: 8

  ###########################################################################
  # INTEGRATION (ONLY ONE TOTAL SENSOR — NO HELPERS, NO DUPLICATES)
  ###########################################################################
  - platform: integration
    source: sensor.gas_consumption_signal
    name: Gas Used Total
    unique_id: gas_used_total
    method: trapezoidal
    round: 3

############################
# TEMPLATE SENSORS
############################

template:
  ###########################################################################
  # GAS CONSUMPTION SIGNAL
  ###########################################################################
  - trigger:
      - platform: state
        entity_id: sensor.filtered_gas_volume

    sensor:
      - name: Gas Consumption Signal
        unique_id: gas_consumption_signal
        object_id: gas_consumption_signal
        unit_of_measurement: "L"
        device_class: gas
        state_class: measurement
        icon: mdi:fire
        state: >
          {{ states('sensor.filtered_gas_volume') | float(0) * -1 }}

  ###########################################################################
  # DERIVED VALUES
  ###########################################################################
  - sensor:
      - name: Gas Usage m3
        unique_id: gas_used_m3
        unit_of_measurement: "m³"
        device_class: gas
        state_class: total_increasing
        icon: mdi:meter-cubic
        state: >
          {{ (states('sensor.gas_used_total') | float(0) / 1000) | round(4) }}

      - name: Gas Cost
        unique_id: gas_cost_total
        unit_of_measurement: "THB"
        device_class: monetary
        state_class: total
        icon: mdi:cash
        state: >
          {{ states('sensor.gas_used_total') | float(0)
             * states('input_number.gas_tariff_rate') | float(0) }}

  ############################
  # REFILL DETECTION
  ############################

  - binary_sensor:
      - name: Gas Tank Refilled
        unique_id: gas_tank_refilled
        delay_off: "00:02:00"
        state: >
          {% set current = states('sensor.filtered_gas_volume') | float(0) %}
          {% set previous = states('sensor.filtered_gas_volume') | float(0) %}
          {{ (current - previous) > 2 }}

############################
# UTILITY METERS
############################

utility_meter:
  gas_daily:
    name: Gas Daily
    source: sensor.gas_used_total
    cycle: daily

  gas_monthly:
    name: Gas Monthly
    source: sensor.gas_used_total
    cycle: monthly

  gas_yearly:
    name: Gas Yearly
    source: sensor.gas_used_total
    cycle: yearly
