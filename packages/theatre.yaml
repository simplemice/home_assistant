template:
  - trigger:
      - platform: time
        at: "18:55:00"
      - platform: time
        at: "22:35:00"
      - platform: state
        entity_id:
          - sensor.radarr_ready_movies
          - sensor.sonarr_ready_shows
      - platform: homeassistant
        event: start
    sensor:
      - name: "Today's Media Picks"
        unique_id: todays_media_picks
        state: "{{ now().timestamp() | int }}"
        attributes:
          picks: >
            {% set movies = state_attr('sensor.radarr_ready_movies','movies') or [] %}
            {% set shows = state_attr('sensor.sonarr_ready_shows','shows') or [] %}
            {{ {
              "movie": movies | random if movies else none,
              "show": shows | random if shows else none
            } }}
