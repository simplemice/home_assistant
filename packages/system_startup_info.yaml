###############################################################################
# Package: Home Assistant Startup & Update Detection (Modern Refactor)
# Author : Simplemice
#
# Features:
#   - Trigger-based detection (no helpers)
#   - Persistent attributes (version tracking)
#   - Clean startup reason detection
#   - Optional safety recovery logic
###############################################################################

###############################################################################
# TEMPLATE SENSORS
###############################################################################
template:
  ###########################################################################
  # Core Sensor (state + attributes storage)
  ###########################################################################
  - trigger:
      # Detect Core Update installation
      - platform: state
        entity_id: update.home_assistant_core_update
        from: "on"
        to: "off"

      # Detect HA startup
      - platform: homeassistant
        event: start

    sensor:
      - name: HA Startup Reason
        unique_id: ha_startup_reason
        icon: mdi:restart

        state: >
          {% if trigger.platform == 'state' %}
            update
          {% elif trigger.platform == 'homeassistant' %}
            {{ this.attributes.reason if this.attributes.reason is defined else 'normal' }}
          {% else %}
            normal
          {% endif %}

        attributes:
          reason: >
            {% if trigger.platform == 'state' %}
              update
            {% elif trigger.platform == 'homeassistant' %}
              {{ this.attributes.reason if this.attributes.reason is defined else 'normal' }}
            {% else %}
              normal
            {% endif %}

          from_version: >
            {% if trigger.platform == 'state' %}
              {{ trigger.from_state.attributes.installed_version }}
            {% else %}
              {{ this.attributes.from_version if this.attributes.from_version is defined else '' }}
            {% endif %}

          to_version: >
            {% if trigger.platform == 'state' %}
              {{ trigger.from_state.attributes.latest_version }}
            {% else %}
              {{ this.attributes.to_version if this.attributes.to_version is defined else '' }}
            {% endif %}

          last_event: >
            {{ now().isoformat() }}

  ###########################################################################
  # Human-readable text sensor
  ###########################################################################
  - sensor:
      - name: HA Startup Reason Text
        unique_id: ha_startup_reason_text
        icon: mdi:information

        state: >
          {% set reason = state_attr('sensor.ha_startup_reason','reason') %}
          {% set from_v = state_attr('sensor.ha_startup_reason','from_version') %}
          {% set to_v = state_attr('sensor.ha_startup_reason','to_version') %}

          {% if reason == 'update' and from_v and to_v %}
            System upgraded from {{ from_v }} to {{ to_v }}
          {% else %}
            Manual restart or power recovery
          {% endif %}

###############################################################################
# AUTOMATIONS
###############################################################################
automation:
  ###########################################################################
  # Safety: Reset stale update flag (edge-case protection)
  ###########################################################################
  - alias: HA Startup Reason Safety Reset
    id: ha_startup_reason_safety_reset
    mode: single

    trigger:
      - platform: homeassistant
        event: start

    condition:
      - condition: template
        value_template: >
          {{ state_attr('sensor.ha_startup_reason','reason') == 'update' }}

    action:
      - delay: "00:05:00"

      - service: homeassistant.update_entity
        target:
          entity_id: sensor.ha_startup_reason

###############################################################################
# OPTIONAL SCRIPT (for announcements / TTS / logging)
###############################################################################
script:
  ha_announce_startup:
    alias: HA Announce Startup Reason
    mode: single

    sequence:
      - variables:
          message: "{{ states('sensor.ha_startup_reason_text') }}"

      # Example: replace with your TTS system (JARVIS, Chime TTS, etc.)
      - service: logbook.log
        data:
          name: "Home Assistant"
          message: "{{ message }}"
