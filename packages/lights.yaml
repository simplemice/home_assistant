input_boolean:
  adaptive_lights_mode:
    name: "Adaptive Lights Mode"
    icon: mdi:lightbulb
  tv_screensaver:
    name: "TV Screensaver"
    icon: mdi:television
  mix_screensaver:
    name: "MIX Screensaver"
    icon: mdi:television

light:
  - platform: group
    name: "Livingroom Ambient"
    unique_id: livingroom_ambient
    entities:
      - light.wled_closet_l_main
      - light.wled_closet_r_main
      - light.wled_table
      - light.wled_tv
      - light.wled_wall_light
      - light.closet_lamp

  - platform: group
    unique_id: lights
    name: "Lights"
    entities:
      #- light.bathroom_bulb
      - light.porch_bulb
      - light.closet_lamp
      - light.backyard_light

  - platform: group
    unique_id: kitchen_ambient
    name: "Kitchen Ambient"
    entities:
      - light.kitchen_wled_kitchen_closet_down
      - light.kitchen_fridge_light

  - platform: group
    unique_id: bedroom_ambient
    name: "Bedroom Ambient"
    entities:
      - light.bedroom_alarm_gateway_light
      - light.bedroom_bed_strip

  - platform: group
    unique_id: outside_lights
    name: "Outside Lights"
    entities:
      - light.porch_bulb
      - light.backyard_light

  - platform: group
    unique_id: wled_ambient
    name: "WLED Ambient"
    entities:
      - light.wled_closet_l_main
      - light.wled_closet_r_main
      - light.wled_table
      - light.wled_tv
      - light.wled_wall_light

switch:
  - platform: group
    unique_id: camera_night_lights
    name: Camera Night Lights
    entities:
      - switch.garage_camera_light
      - switch.backyard_camera_light
