###############################################################################
#   @author         :   Simplemice
#   @date           :   01/09/2025
#   @package        :   Climate
#   @description    :   Climate automation helpers, runtime tracking,
#                       and consolidated climate sensors.
###############################################################################

smartir: # keep integration reference

###############################################################################
# Climate Package (Refactored 2026)
###############################################################################

# ─── Controls ────────────────────────────────────────────────────────────────
input_boolean:
  climate_automation:
    name: House Climate Automation
    icon: mdi:air-conditioner

input_datetime:
  climate_on_time:
    name: Climate Time On
    has_date: false
    has_time: true

  climate_off_time:
    name: Climate Time Off
    has_date: false
    has_time: true

# ─── Devices ────────────────────────────────────────────────────────────────
climate:
  - platform: smartir
    name: Bedroom Aircon
    unique_id: bedroom_aircon
    device_code: 9991
    controller_data: remote.bedroom_remote_hub
    temperature_sensor: sensor.bedroom_temp_temperature
    humidity_sensor: sensor.bedroom_temp_humidity

# ─── Groups (Modern Method) ──────────────────────────────────────────────────
group:
  all_fans:
    name: All Fans
    entities:
      - fan.livingroom_fan
      - fan.kitchen_fan

# ─── Runtime Tracking ───────────────────────────────────────────────────────
sensor:
  - platform: history_stats
    name: AC Runtime Today Dry
    unique_id: ac_runtime_today_dry
    entity_id: climate.bedroom_aircon
    state: "dry"
    type: time
    start: "{{ today_at() }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: AC Runtime Today Cool
    unique_id: ac_runtime_today_cool
    entity_id: climate.bedroom_aircon
    state: "cool"
    type: time
    start: "{{ today_at() }}"
    end: "{{ now() }}"

# ─── Template Sensors (Modern) ──────────────────────────────────────────────
template:
  - sensor:
      - name: House Temperature
        unique_id: house_temperature
        unit_of_measurement: "°C"
        state: >
          {{
            [
              states('sensor.livingroom_temp_temperature')|float(0),
              states('sensor.bedroom_temp_temperature')|float(0)
            ] | average | round(1)
          }}

      - name: AC Runtime Today
        unique_id: ac_runtime_today
        unit_of_measurement: h
        state: >
          {% set dry = states('sensor.ac_runtime_today_dry')|float(0) %}
          {% set cool = states('sensor.ac_runtime_today_cool')|float(0) %}
          {{ (dry + cool) | round(2) }}
        attributes:
          minutes: >
            {% set dry = states('sensor.ac_runtime_today_dry')|float(0) %}
            {% set cool = states('sensor.ac_runtime_today_cool')|float(0) %}
            {{ ((dry + cool) * 60) | int }}

# ─── Utility Meter ──────────────────────────────────────────────────────────
utility_meter:
  monthly_climate:
    name: Monthly AC Runtime
    unique_id: monthly_climate
    source: sensor.ac_runtime_today
    cycle: monthly
