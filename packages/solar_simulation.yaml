template:
- sensor:
  - name: "Solar Live Power"
    unique_id: solar_live_power_simulated
    state: >
      {# Real-world light sensor (rain detector LDR) as primary source.
         Full bright sun day peaks at ~5600 mV.
         Panel system: 3000W rated capacity.
         Minimum sun elevation 5° to filter twilight.
      #}
      {% set mv       = states('sensor.rain_detector_illuminance_average_20min') |
      float(0) %}
      {% set elev     = states('sensor.astroweather_home_sun_altitude') | float(0)
      %}
      {% set max_mv   = 5600 %}
      {% set panel_w  = 3000 %}
      {% set eff      = 0.85 %}
      {% if elev < 5 %}{{ 0 }}
      {% else %}
        {{ [mv / max_mv * panel_w * eff, panel_w] | min | round(1) }}
      {% endif %}
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:solar-power

  - name: "Solar Power to Home"
    unique_id: solar_power_to_home
    state: >
      {% set solar = states('sensor.solar_live_power_simulated') | float(0) %}
      {% set home  = states('sensor.sim_home_power') | float(0) %}
      {{ [solar, home] | min | round(1) }}
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:home-lightning-bolt

  - name: "Solar Power to Battery"
    unique_id: solar_power_to_battery
    state: >
      {% set solar = states('sensor.solar_live_power_simulated') | float(0) %}
      {% set home  = states('sensor.sim_home_power') | float(0) %}
      {% set soc   = states('sensor.battery_soc_simulated') | float(0) %}
      {% if soc >= 100 %}{{ 0 }}
      {% else %}{{ [solar - home, 0] | max | round(1) }}{% endif %}
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:solar-power-variant

  - name: "Solar Energy Accumulated (Simulated)"
    unique_id: solar_energy_accumulated_simulated
    state: >
      {{ states('sensor.total_solar_energy_in') | float(0) | round(3) }}
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    icon: mdi:solar-power
sensor:
- platform: integration
  source: sensor.solar_live_power_simulated
  name: total_solar_energy_in
  unique_id: total_solar_energy_in
  unit_prefix: k
  round: 3
  method: left

utility_meter:
  solar_energy_daily:
    source: sensor.total_solar_energy_in
    cycle: daily
    name: solar_energy_daily

  solar_energy_monthly:
    source: sensor.total_solar_energy_in
    cycle: monthly
    name: solar_energy_monthly
