###############################################################################
# @package     : Solar
# @description : High-Precision Solar Simulation
###############################################################################

template:
  - sensor:
      - name: "Solar Live Power (Simulated)"
        unique_id: solar_live_power_simulated
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power
        availability: >
          {{ is_number(states('sensor.pirateweather_cloud_coverage')) and 
             is_number(state_attr('sun.sun', 'elevation')) }}
        state: >
          {% set panel_wp = 11200 %}
          {% set sun_elev = state_attr('sun.sun', 'elevation') | float(0) %}
          {% if sun_elev <= 0 %}
            0
          {% else %}
            {% set clouds = states('sensor.pirateweather_cloud_coverage') | float(0) / 100 %}
            {% set rain = states('sensor.pirateweather_precip_probability') | float(0) / 100 %}
            {% set sun_factor = (sun_elev / 90) ** 1.35 %}
            {% set cloud_loss = 1 - (clouds * 0.65) %}
            {% set rain_loss = 1 - (rain * 0.55) %}
            {% set thermal_loss = 0.78 %}
            {% set inverter_eff = 0.96 %}
            {% set realism = [1 - ((clouds * 0.4) + (rain * 0.35)), 0.25] | max %}
            {% set total_factor = sun_factor * cloud_loss * rain_loss * thermal_loss * inverter_eff * realism %}
            {{ (panel_wp * total_factor) | round(1) }}
          {% endif %}

sensor:
  - platform: integration
    source: sensor.solar_live_power_simulated
    name: "Solar Energy Accumulated (Simulated)"
    unique_id: solar_energy_accumulated_simulated
    unit_prefix: k
    method: left
    round: 3

utility_meter:
  solar_energy_daily:
    source: sensor.solar_energy_accumulated_simulated
    cycle: daily
