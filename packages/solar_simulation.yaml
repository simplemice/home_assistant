template:
- sensor:
  - name: "Solar Live Power"
    unique_id: solar_live_power_simulated
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:solar-power
    state: >
      {% set mv      = states('sensor.rain_detector_illuminance_average_20min') |
      float(0) %}
      {% set elev    = states('sensor.astroweather_home_sun_altitude') | float(0)
      %}
      {% set max_mv  = 5600 %}
      {% set panel_w = 3000 %}
      {% set eff     = 0.85 %}
      {% if elev < 5 %}{{ 0 }}
      {% else %}{{ [mv / max_mv * panel_w * eff, panel_w] | min | round(1) }}
      {% endif %}

  - name: "Solar Power to Home"
    unique_id: solar_power_to_home
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:home-lightning-bolt
    state: >
      {% set solar = states('sensor.solar_live_power_simulated') | float(0) %}
      {% set home  = states('sensor.sim_home_power') | float(0) %}
      {{ [solar, home] | min | round(1) }}

  - name: "Solar Power to Battery"
    unique_id: solar_power_to_battery
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:solar-power-variant
    state: >
      {% set solar   = states('sensor.solar_live_power_simulated') | float(0) %}
      {% set home    = states('sensor.sim_home_power') | float(0) %}
      {% set soc     = states('sensor.battery_soc_simulated') | float(0) %}
      {% set max_chg = 3000 %}
      {% if soc >= 100 %}{{ 0 }}
      {% else %}{{ [[solar - home, 0] | max, max_chg] | min | round(1) }}{% endif
      %}

  - name: "Solar Export to Grid"
    unique_id: solar_export_to_grid
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:transmission-tower-export
    state: >
      {% set solar = states('sensor.solar_live_power_simulated') | float(0) %}
      {% set home  = states('sensor.sim_home_power') | float(0) %}
      {% set soc   = states('sensor.battery_soc_simulated') | float(0) %}
      {% if soc >= 100 and solar > home %}{{ (solar - home) | round(1) }}
      {% else %}{{ 0 }}{% endif %}

  - name: "Solar Energy Accumulated (Simulated)"
    unique_id: solar_energy_accumulated_simulated
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    icon: mdi:solar-power
    state: >
      {{ states('sensor.total_solar_energy_in') | float(0) | round(3) }}
sensor:
- platform: integration
  source: sensor.solar_live_power_simulated
  name: total_solar_energy_in
  unique_id: total_solar_energy_in
  unit_prefix: k
  round: 3
  method: left

- platform: integration
  source: sensor.solar_export_to_grid
  name: total_solar_export_energy
  unique_id: total_solar_export_energy
  unit_prefix: k
  round: 3
  method: left
utility_meter:
  solar_energy_daily:
    source: sensor.total_solar_energy_in
    cycle: daily
    name: solar_energy_daily

  solar_energy_monthly:
    source: sensor.total_solar_energy_in
    cycle: monthly
    name: solar_energy_monthly

  solar_energy_yearly:
    source: sensor.total_solar_energy_in
    cycle: yearly
    name: solar_energy_yearly

  solar_export_daily:
    source: sensor.total_solar_export_energy
    cycle: daily
    name: solar_export_daily

  solar_export_monthly:
    source: sensor.total_solar_export_energy
    cycle: monthly
    name: solar_export_monthly

  solar_export_yearly:
    source: sensor.total_solar_export_energy
    cycle: yearly
    name: solar_export_yearly
